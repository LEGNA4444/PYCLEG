
<!DOCTYPE HTML>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Página no encontrada</title>
    <link rel="icon" type="image/png"
     href="https://www.clipartmax.com/png/middle/195-1956135_error-advice-sign-vector-triangulo-con-signo-de-exclamacion.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding: 50px;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.6s;
        }
        .btn:hover {
            background-color: #4fabf7;
            color: black;
            border-radius: 3px;
            font-size: 10px;

        }
        #toggle-dark {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
        }
        .dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        .dark-mode .container {
            background: #1e1e1e;
        }
        .dark-mode .btn {
            background-color: #BB86FC;
        }
        .dark-mode .btn:hover {
            background-color: #3700B3;
        }
    </style>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const toggleButton = document.getElementById('toggle-dark');
                toggleButton.addEventListener('click', function() {
                    document.body.classList.toggle('dark-mode');
                });
            });
        </script>
    </head>
       <body>
            <button id="toggle-dark">Modo Oscuro</button>
            <div class="container">
                <h1>Error 404</h1>
                    <p>Lo sentimos, la página que buscas no se ha encontrado.</p>
                <a href="https://LEGNA4444.github.io/PYCLEG/index.html" class="btn">Volver a la página principal</a>
            </div>
        </body>
</html>
